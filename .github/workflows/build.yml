name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ec6b988f3cace4eb90d19efe81ab3992ad54251b # main
        with:
          repository: openstack/barbican
          ref: 1fd20ef915ab29e7414e09ce9cd731fe1003c1f3 # stable/2025.2

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@ec6b988f3cace4eb90d19efe81ab3992ad54251b # main
        with:
          image-name: barbican
          build-contexts: barbican=openstack/barbican
          push: ${{ github.event_name != 'pull_request' }}
