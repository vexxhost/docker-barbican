name: build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
      - stable/**

permissions:
  contents: read

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: vexxhost/docker-atmosphere/.github/actions/checkout@ec6b988f3cace4eb90d19efe81ab3992ad54251b # main
        with:
          repository: openstack/barbican
          ref: f8a331a40eb21e6c8f37e07794d57aa98b120af9 # master

      - uses: vexxhost/docker-atmosphere/.github/actions/build-image@ec6b988f3cace4eb90d19efe81ab3992ad54251b # main
        with:
          image-name: barbican
          build-contexts: barbican=openstack/barbican
          push: ${{ github.event_name != 'pull_request' }}
